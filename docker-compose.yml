services:
  mysql:
    image: mysql:8.0
    container_name: usedtrade-mysql
    restart: unless-stopped
    ports:
      # 호스트 3307 → 컨테이너 3306 (로컬 MySQL 과 충돌 회피)
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+09:00
      - --skip-character-set-client-handshake
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - usedtrade-net

  redis:
    image: redis:7-alpine
    container_name: usedtrade-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --appendonly
      - "yes"
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - usedtrade-net

  # 앱 — 위 mysql/redis 와 같은 compose 네트워크에서 호스트명 (mysql, redis) 으로 접근.
  # 로컬 IDE 직접 실행은 그대로 SPRING_PROFILES_ACTIVE=local 사용 (호스트 포트 3307/6379).
  # docker compose 로 띄울 땐 docker profile — 컨테이너 내부 네트워크의 3306/6379.
  # `--profile app` 로 명시적으로 켜야 시작 (인프라만 띄우고 IDE 실행 흐름과 충돌하지 않게).
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: usedtrade-app:local
    container_name: usedtrade-app
    profiles: ["app"]
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_VALIDITY_MS: ${JWT_ACCESS_TOKEN_VALIDITY_MS:-1800000}
      JWT_REFRESH_TOKEN_VALIDITY_MS: ${JWT_REFRESH_TOKEN_VALIDITY_MS:-1209600000}
      JWT_ISSUER: ${JWT_ISSUER:-used-trade}
      TZ: Asia/Seoul
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - usedtrade-net

volumes:
  mysql_data:
    name: usedtrade-mysql-data
  redis_data:
    name: usedtrade-redis-data

networks:
  usedtrade-net:
    name: usedtrade-network
    driver: bridge
