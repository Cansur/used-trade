# ===================================================================
# CI 파이프라인 — push / PR 시 빌드 + 테스트 수행
# Phase 2 (trade 도메인 합류) 부터는 @SpringBootTest 통합 테스트가 실제 MySQL/Redis 를
# 필요로 한다 → GH Actions services 로 ephemeral 컨테이너 띄워 연결.
# 로컬 docker-compose 와 동일한 포트/계정/스키마를 그대로 사용해 yaml 변경 없이 동작.
# ===================================================================

name: CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

# 동시에 같은 브랜치에 여러 번 push 되면 이전 run 은 취소 (GA 크레딧 절약)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    # 통합 테스트가 의존하는 인프라 — 로컬 docker-compose 와 동일한 포트/계정/DB
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpw
          MYSQL_DATABASE: usedtrade
          MYSQL_USER: usedtrade_user
          MYSQL_PASSWORD: usedtrade1234!
        ports:
          - 3307:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -prootpw"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Liberica)
        uses: actions/setup-java@v4
        with:
          distribution: 'liberica'
          java-version: '21'
          cache: 'gradle'

      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      - name: Compile
        run: ./gradlew compileJava compileTestJava --no-daemon

      - name: Test
        run: ./gradlew test --no-daemon

      - name: Upload test report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            build/reports/tests/test/
            build/test-results/test/
          retention-days: 7
