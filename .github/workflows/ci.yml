# ===================================================================
# CI 파이프라인 — push / PR 시 빌드 + 테스트 수행
# 현재(Phase 1)는 유닛 테스트만 실행. 통합 테스트(Testcontainers)는
# trade/chat 도메인 완성 이후 추가될 예정.
# ===================================================================

name: CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

# 동시에 같은 브랜치에 여러 번 push 되면 이전 run 은 취소 (GA 크레딧 절약)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Liberica)
        uses: actions/setup-java@v4
        with:
          distribution: 'liberica'
          java-version: '21'
          cache: 'gradle'

      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      # Phase 1: 테스트 인프라가 아직 없으므로 컴파일만 수행
      # Phase 2: build (유닛 + 통합 테스트) 로 교체
      - name: Compile
        run: ./gradlew compileJava compileTestJava --no-daemon

      - name: Test
        run: ./gradlew test --no-daemon

      - name: Upload test report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            build/reports/tests/test/
            build/test-results/test/
          retention-days: 7
